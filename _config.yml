# Basic Site Settings
locale                   : "en-US"
site_theme               : "default"
title                    : "Büşra Lütfüoğlu Thomann"
title_separator          : "-"
name                     : &name "Büşra Lütfüoğlu Thomann"
description              : &description "Academic website of Büşra Lütfüoğlu Thomann"
url                      : "https://busra-lutfuoglu.github.io"
baseurl                  : ""
repository               : "busra-lutfuoglu/busra-lutfuoglu.github.io"

# Author
author:
  avatar           : "profile.png"   # /images içine koyacaksın
  name             : "Büşra Lütfüoğlu Thomann"
  bio              : "Economics researcher interested in applied microeconomics, labor, migration, and inequality."
  location         : "San Jose, CA, USA"
  email            : "thomannbusra@gmail.com"

  github           : ""        # username yazabilirsin
  linkedin         : ""        # linkedin username yazabilirsin

# Site Settings
breadcrumbs              : false
words_per_minute         : 160
future                   : true
read_more                : "disabled"
talkmap_link             : false

# Comments kapalı
comments:
  provider               : false

# SEO (şimdilik boş bırak)
google_site_verification :
bing_site_verification   :

# Analytics kapalı (sonra eklenir)
analytics:
  provider               : false

# Reading Files
include:
  - .htaccess
  - _pages
  - files

exclude:
  - "*.sublime-project"
  - "*.sublime-workspace"
  - .asset-cache
  - .bundle
  - .github
  - .jekyll-assets-cache
  - .sass-cache
  - node_modules
  - vendor

keep_files:
  - .git

encoding: "utf-8"
markdown_ext: "markdown,mkdown,mkdn,mkd,md"

# Markdown
markdown: kramdown
highlighter: rouge

# Collections
collections:
  teaching:
    output: true
    permalink: /:collection/:path/
  publications:
    output: true
    permalink: /:collection/:path/
  portfolio:
    output: true
    permalink: /:collection/:path/
  talks:
    output: true
    permalink: /:collection/:path/

# Defaults
defaults:
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true

# Output
permalink: /:categories/:title/
timezone: America/Los_Angeles

# Plugins (GitHub Pages uyumlu)
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jemoji
